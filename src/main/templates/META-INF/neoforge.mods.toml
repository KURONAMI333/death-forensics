modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''
${mod_description}
'''

# No [[mixins]]: Death Forensics only listens to vanilla LivingDeathEvent
# and stores a small per-player record. No mixin, no registered game
# object, no passive tick task.

# NOTE: versionRange uses neo_version, NOT loader_version_range
# (composing the loader range here yields an unparseable range and
# silently breaks the mod — lesson carried from Free Server Saver).
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
